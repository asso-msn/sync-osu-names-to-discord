name: Publish container image

on:
  push:
    branches:
      - main

env:
  DOCKER_REPOSITORY: assomsn/sync-osu-names-to-discord

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_REPOSITORY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          load: true
          tags: smoke-test
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: docker run --rm smoke-test --help

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            docker.io/${{ env.DOCKER_REPOSITORY }}:latest
            docker.io/${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
